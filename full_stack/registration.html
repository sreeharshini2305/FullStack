<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-image:url("https://images.unsplash.com/photo-1504711434969-e33886168f5c");
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    padding:30px;
    width:400px;
    border-radius:12px;
    background: rgb(155, 198, 248);
    border-radius: 6px;
    border-width: 3px;
}
</style>

<script>
function validateForm(){
    let pwd = document.getElementById("password").value;
    let cpwd = document.getElementById("confirm_password").value;

    if(pwd !== cpwd){
        alert("Password and Confirm Password must be same!");
        return false;
    }
    return true;
}
</script>
</head>

<body>

<div class="card shadow">
<h3 class="text-center">User Registration</h3>

<form method="post" action="register_process.php" onsubmit="return validateForm()">

<input type="text" name="name" class="form-control my-2"
placeholder="Enter Name"
pattern="[A-Za-z ]+"
title="Only alphabets and spaces allowed"
required>

<input type="email" name="email" class="form-control my-2"
placeholder="Enter Email" required>

<input type="password" id="password" name="password"
class="form-control my-2"
placeholder="Create Password"
pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&]).{6,}"
title="Must contain letters, numbers & special character (min 6)"
required>

<input type="password" id="confirm_password" name="confirm_password"
class="form-control my-2"
placeholder="Confirm Password" required>

<button type="submit" class="btn btn-primary w-100">Register Now</button>

</form>
<div class="register-link">
<p>Already have account? <a href="login.html">Login Here</a></p>
</div>
</div>

</body>
</html>
